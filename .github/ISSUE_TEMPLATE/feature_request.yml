name: 功能建议
description: 提出与 NovelClaw 直接相关的功能改进建议
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        请只提交具体、可讨论的功能建议。无关、重复、辱骂、刷屏或恶意内容会被关闭、锁定、删除并向 GitHub 举报。
  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认
      options:
        - label: 我确认这个 issue 与 NovelClaw 项目直接相关，不是刷屏、攻击、广告或无关讨论。
          required: true
        - label: 我已经搜索过现有 issues，没有找到相同建议。
          required: true
        - label: 我会围绕具体功能需求讨论，不发布人身攻击或无关内容。
          required: true
  - type: textarea
    id: motivation
    attributes:
      label: 需求背景
      description: 说明这个功能要解决什么具体问题。
      placeholder: 目前遇到的限制或使用场景是什么？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你希望 NovelClaw 如何改进。
      placeholder: 你期望新增或调整什么行为？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你考虑过其他方案，可以写在这里。
    validations:
      required: false