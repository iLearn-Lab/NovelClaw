name: 功能建议 / Feature request
description: 提出与 NovelClaw 直接相关的功能改进建议 / Suggest a feature directly related to NovelClaw
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        请只提交具体、可讨论的功能建议。无关、重复、辱骂、刷屏或恶意内容会被关闭、锁定、删除并向 GitHub 举报。

        Please submit only concrete and discussable feature requests. Irrelevant, duplicate, abusive, spam, or malicious content may be closed, locked, deleted, and reported to GitHub.
  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认 / Pre-submission checklist
      options:
        - label: 我确认这个 issue 与 NovelClaw 项目直接相关，不是刷屏、攻击、广告或无关讨论。 / I confirm this issue is directly related to NovelClaw and is not spam, harassment, advertising, or an unrelated discussion.
          required: true
        - label: 我已经搜索过现有 issues，没有找到相同建议。 / I have searched existing issues and did not find the same request.
          required: true
        - label: 我会围绕具体功能需求讨论，不发布人身攻击或无关内容。 / I will keep the discussion focused on the feature request and will not post personal attacks or unrelated content.
          required: true
  - type: textarea
    id: motivation
    attributes:
      label: 需求背景 / Motivation
      description: 说明这个功能要解决什么具体问题。 / Explain the specific problem this feature would solve.
      placeholder: 目前遇到的限制或使用场景是什么？ / What limitation or use case are you trying to address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed solution
      description: 描述你希望 NovelClaw 如何改进。 / Describe how you would like NovelClaw to improve.
      placeholder: 你期望新增或调整什么行为？ / What behavior should be added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives
      description: 如果你考虑过其他方案，可以写在这里。 / If you have considered other approaches, describe them here.
    validations:
      required: false