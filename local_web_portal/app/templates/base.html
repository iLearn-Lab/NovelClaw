<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Long Story Portal{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
  <div class="page-bg"></div>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">Long Story Portal</a>
      {% if user %}
      <div class="user-menu">
        <span class="user-email">{{ user.email }}</span>
        <form method="post" action="/logout">
          <button type="submit" class="btn btn-outline">Logout</button>
        </form>
      </div>
      {% endif %}
    </div>
  </header>

  <main class="container page-shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
